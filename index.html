<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SHORE DASH</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div id="gameWrapper">
    <canvas id="c" width="800" height="400"></canvas>

    <div id="ui">
      <div id="scoreDisplay">0</div>
      <div id="livesDisplay">
        <span class="heart">♥</span>
        <span class="heart">♥</span>
        <span class="heart">♥</span>
      </div>
    </div>

    <div id="comboDisplay">NICE! ×2</div>

    <div id="overlay">
      <h1>SHORE DASH</h1>
      <div class="subtitle">Endless Beach Runner</div>
      <div class="final-score" id="finalScore">SCORE: 0</div>
      <button id="startBtn">CATCH A WAVE</button>
      <div class="hint">SPACE / TAP to jump • Double jump available!</div>
    </div>
  
    <!-- Mobile Controls -->
    <div id="mobileControls">
      <div id="joystick">
        <div id="stick"></div>
      </div>
      <button id="jumpBtn">JUMP</button>
    </div>

  </div>

  <script src="game.js"></script>

</body>
</html>
